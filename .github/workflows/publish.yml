name: Publish Extension

on:
  release:
    types: [created]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    name: Package (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: ubuntu-24.04-arm
            target: linux-arm64
          - os: macos-13
            target: darwin-x64
          - os: macos-latest
            target: darwin-arm64
          - os: windows-latest
            target: win32-x64

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      - run: npm ci
        env:
          npm_config_fetch_timeout: 600000
      - run: npx vsce package --target ${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ matrix.target }}
          path: '*.vsix'

  upload-release-assets:
    name: Upload Release Assets
    needs: package
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: vsix-*
          merge-multiple: true
      - name: Upload VSIX files to release
        run: gh release upload "${{ github.event.release.tag_name }}" *.vsix --clobber
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}

  publish:
    name: Publish to Marketplace
    needs: package
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: vsix-*
          merge-multiple: true
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - run: |
          for vsix in *.vsix; do
            npx @vscode/vsce publish --packagePath "$vsix"
          done
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
